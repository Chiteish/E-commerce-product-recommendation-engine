<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastAPI React Recommendation Grid</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- React & Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Custom Vanilla CSS -->
    <style>
        :root {
            --bg-dark: #070a13;
            --bg-card: rgba(22, 33, 62, 0.75);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            
            --primary: #3b82f6;
            --secondary: #10b981;
            --accent: #ec4899;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            padding: 24px;
            height: 100vh;
        }

        .header-area {
            max-width: 1200px;
            margin: 0 auto 24px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
        }

        .header-area h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(12px);
            padding: 16px;
            border-radius: 12px;
            display: flex;
            gap: 24px;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto 24px auto;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .control-group label {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .form-control {
            background-color: #07090e;
            border: 1px solid var(--border-color);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
            font-size: 13px;
        }

        .form-control:focus {
            border-color: var(--primary);
        }

        /* 4-Column Responsive Grid Layout */
        .recs-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        @media (max-width: 1024px) {
            .recs-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 640px) {
            .recs-grid { grid-template-columns: 1fr; }
        }

        /* Recommendation Product Card */
        .rec-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
            min-height: 220px;
        }

        .rec-card:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        /* Card Header details */
        .card-top {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .category-badge {
            align-self: flex-start;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: 20px;
            background-color: rgba(59, 130, 246, 0.15);
            color: var(--primary);
        }

        .prod-title {
            font-size: 14px;
            font-weight: 600;
            color: white;
            line-height: 1.3;
            margin-top: 4px;
        }

        /* Card Middle details */
        .price-rating {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
        }

        .price {
            font-size: 16px;
            font-weight: 700;
            color: #fbbf24;
        }

        .rating {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 3px;
        }

        /* Card Bottom details (Ranking Scores) */
        .card-bottom {
            margin-top: 16px;
            border-top: 1px solid var(--border-color);
            padding-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .score-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
        }

        .score-val {
            font-weight: 700;
            color: var(--secondary);
        }

        /* Recommendation Source Styles */
        .source-badge {
            font-size: 10px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 4px;
            text-align: center;
        }

        .source-lgb {
            background-color: rgba(16, 185, 129, 0.15);
            color: var(--secondary);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .source-explore {
            background-color: rgba(236, 72, 153, 0.15);
            color: var(--accent);
            border: 1px solid rgba(236, 72, 153, 0.3);
        }

        /* UI State Displays */
        .loading-text {
            grid-column: 1 / -1;
            text-align: center;
            padding: 48px;
            color: var(--text-secondary);
            font-style: italic;
        }

        .error-box {
            grid-column: 1 / -1;
            background-color: rgba(239, 68, 68, 0.15);
            border: 1px dashed rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- React App component script -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [userId, setUserId] = useState("U001");
            const [epsilon, setEpsilon] = useState(0.10);
            const [recs, setRecs] = useState([]);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);

            const users = [
                { id: "U001", name: "Alice Smith" },
                { id: "U002", name: "Bob Johnson" },
                { id: "U003", name: "Charlie Brown" },
                { id: "U004", name: "Diana Prince" },
                { id: "U005", name: "Ethan Hunt" },
                { id: "U006", name: "Fiona Gallagher" }
            ];

            const fetchRecommendations = async () => {
                setLoading(true);
                setError(null);
                try {
                    // Fetch recommendations from local FastAPI service
                    const url = `http://127.0.0.1:8000/recommend?user_id=${userId}&top_n=4&epsilon=${epsilon}`;
                    const response = await fetch(url);
                    
                    if (!response.ok) {
                        throw new Error(`Server returned status: ${response.status}. Make sure the FastAPI app is running!`);
                    }
                    
                    const data = await response.json();
                    setRecs(data);
                } catch (err) {
                    setError(err.message);
                    setRecs([]);
                } finally {
                    setLoading(false);
                }
            };

            // Re-fetch recommendations on user context or epsilon value change
            useEffect(() => {
                fetchRecommendations();
            }, [userId, epsilon]);

            return (
                <div>
                    {/* Header Area */}
                    <div className="header-area">
                        <div>
                            <h1>FASTAPI + REACT RECSYS</h1>
                            <p style={{ fontSize: '11px', color: 'var(--text-secondary)', marginTop: '4px' }}>
                                Real-time Candidate Fusion, LightGBM Ranking, and diversity caps.
                            </p>
                        </div>
                        <button 
                            onClick={fetchRecommendations} 
                            className="form-control"
                            style={{ backgroundColor: 'var(--primary)', border: 'none', fontWeight: '600' }}
                        >
                            🔄 Refresh Feed
                        </button>
                    </div>

                    {/* Controller Card */}
                    <div className="controls-card">
                        <div className="control-group">
                            <label>Context User Profile:</label>
                            <select 
                                value={userId} 
                                onChange={(e) => setUserId(e.target.value)}
                                className="form-control"
                            >
                                {users.map(u => (
                                    <option key={u.id} value={u.id}>{u.name} ({u.id})</option>
                                ))}
                            </select>
                        </div>

                        <div className="control-group" style={{ flex: 1 }}>
                            <label>Exploration Rate (ε-Greedy): {(epsilon * 100).toFixed(0)}%</label>
                            <input 
                                type="range" 
                                min="0.0" 
                                max="1.0" 
                                step="0.05"
                                value={epsilon}
                                onChange={(e) => setEpsilon(parseFloat(e.target.value))}
                                style={{ width: '100%', cursor: 'pointer' }}
                            />
                        </div>
                    </div>

                    {/* 4-Column Grid View */}
                    <div className="recs-grid">
                        {loading && <div className="loading-text">Loading personalized recommendations...</div>}
                        
                        {error && (
                            <div className="error-box">
                                <p style={{ fontWeight: '600' }}>⚠️ Connection Error</p>
                                <p style={{ fontSize: '12px', marginTop: '4px' }}>{error}</p>
                                <p style={{ fontSize: '11px', color: 'var(--text-secondary)', marginTop: '8px' }}>
                                    Launch the FastAPI server first: <code>uvicorn src.serving_api:app --reload</code>
                                </p>
                            </div>
                        )}

                        {!loading && !error && recs.map(item => {
                            const isExploration = item.source === "e-Greedy Exploration";
                            const badgeClass = isExploration ? "source-badge source-explore" : "source-badge source-lgb";
                            
                            return (
                                <div key={item.id} className="rec-card">
                                    <div className="card-top">
                                        <span className="category-badge">{item.category}</span>
                                        <h4 className="prod-title" title={item.title}>{item.title}</h4>
                                    </div>
                                    
                                    <div>
                                        <div className="price-rating">
                                            <span className="price">${item.price.toFixed(2)}</span>
                                            <span className="rating">⭐️ {item.rating.toFixed(1)}</span>
                                        </div>

                                        <div className="card-bottom">
                                            <div className="score-row">
                                                <span style={{ color: 'var(--text-secondary)' }}>Ranking Score:</span>
                                                <span className="score-val">{item.score.toFixed(4)}</span>
                                            </div>
                                            <div className="score-row" style={{ marginTop: '4px' }}>
                                                <span style={{ color: 'var(--text-secondary)' }}>Engine Source:</span>
                                                <span className={badgeClass}>{item.source}</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
